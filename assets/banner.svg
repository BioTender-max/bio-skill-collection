<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- DNA helix decoration (left) -->
  <g opacity="0.25" stroke="#22d3ee" stroke-width="1.5" fill="none">
    <path d="M 50 30 Q 70 60 50 90 Q 30 120 50 150 Q 70 180 50 200"/>
    <path d="M 80 30 Q 60 60 80 90 Q 100 120 80 150 Q 60 180 80 200"/>
    <line x1="50" y1="50" x2="80" y2="50" stroke-width="1"/>
    <line x1="50" y1="70" x2="80" y2="70" stroke-width="1"/>
    <line x1="50" y1="90" x2="80" y2="90" stroke-width="1"/>
    <line x1="50" y1="110" x2="80" y2="110" stroke-width="1"/>
    <line x1="50" y1="130" x2="80" y2="130" stroke-width="1"/>
    <line x1="50" y1="150" x2="80" y2="150" stroke-width="1"/>
    <line x1="50" y1="170" x2="80" y2="170" stroke-width="1"/>
  </g>

  <!-- DNA helix decoration (right) -->
  <g opacity="0.25" stroke="#34d399" stroke-width="1.5" fill="none">
    <path d="M 720 30 Q 740 60 720 90 Q 700 120 720 150 Q 740 180 720 200"/>
    <path d="M 750 30 Q 730 60 750 90 Q 770 120 750 150 Q 730 180 750 200"/>
    <line x1="720" y1="50" x2="750" y2="50" stroke-width="1"/>
    <line x1="720" y1="70" x2="750" y2="70" stroke-width="1"/>
    <line x1="720" y1="90" x2="750" y2="90" stroke-width="1"/>
    <line x1="720" y1="110" x2="750" y2="110" stroke-width="1"/>
    <line x1="720" y1="130" x2="750" y2="130" stroke-width="1"/>
    <line x1="720" y1="150" x2="750" y2="150" stroke-width="1"/>
    <line x1="720" y1="170" x2="750" y2="170" stroke-width="1"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="800" height="3" fill="url(#accent)" rx="2"/>

  <!-- Accent line bottom -->
  <rect x="0" y="197" width="800" height="3" fill="url(#accent)" rx="2"/>

  <!-- Glowing dots -->
  <circle cx="140" cy="40" r="3" fill="#22d3ee" opacity="0.6" filter="url(#glow)"/>
  <circle cx="660" cy="160" r="3" fill="#34d399" opacity="0.6" filter="url(#glow)"/>
  <circle cx="200" cy="160" r="2" fill="#818cf8" opacity="0.5"/>
  <circle cx="600" cy="40" r="2" fill="#818cf8" opacity="0.5"/>

  <!-- Main title -->
  <text x="400" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="url(#title-grad)" text-anchor="middle" letter-spacing="-0.5">Awesome Bio Agent Skills</text>

  <!-- Accent underline -->
  <rect x="200" y="96" width="400" height="2" fill="url(#accent)" rx="1" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="400" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="0.5">AI AGENT SKILLS FOR BIOMEDICAL RESEARCH</text>

  <!-- Stats row -->
  <text x="220" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#22d3ee" text-anchor="middle">1,306</text>
  <text x="220" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.5">SKILLS</text>

  <text x="340" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#818cf8" text-anchor="middle">15</text>
  <text x="340" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.5">CATEGORIES</text>

  <text x="460" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#34d399" text-anchor="middle">11</text>
  <text x="460" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.5">SOURCES</text>

  <text x="580" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#f59e0b" text-anchor="middle">6,772</text>
  <text x="580" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.5">FILES</text>

  <!-- Vertical separators -->
  <line x1="280" y1="150" x2="280" y2="185" stroke="#1e293b" stroke-width="1" opacity="0.8"/>
  <line x1="400" y1="150" x2="400" y2="185" stroke="#1e293b" stroke-width="1" opacity="0.8"/>
  <line x1="520" y1="150" x2="520" y2="185" stroke="#1e293b" stroke-width="1" opacity="0.8"/>
</svg>