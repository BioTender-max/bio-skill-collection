<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f0ff"/>
      <stop offset="55%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#e8eeff"/>
    </linearGradient>
    <linearGradient id="bioGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38d9a9"/>
      <stop offset="100%" stop-color="#4dabf7"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#748ffc"/>
      <stop offset="100%" stop-color="#9775fa"/>
    </linearGradient>
    <linearGradient id="dna1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b197fc"/>
      <stop offset="50%" stop-color="#74c0fc"/>
      <stop offset="100%" stop-color="#63e6be"/>
    </linearGradient>
    <linearGradient id="dna2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#63e6be"/>
      <stop offset="50%" stop-color="#74c0fc"/>
      <stop offset="100%" stop-color="#b197fc"/>
    </linearGradient>
    <radialGradient id="bub1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dde8ff" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="bub2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d0f0e8" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="bub3" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e8d8ff" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="bub4" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d0e8ff" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="iconG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#748ffc"/>
      <stop offset="100%" stop-color="#9775fa"/>
    </linearGradient>
    <linearGradient id="ulGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#748ffc"/>
      <stop offset="100%" stop-color="#38d9a9"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#b8bce8" opacity="0.5"/>
    </pattern>
    <filter id="ds">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#a78bfa" flood-opacity="0.13"/>
    </filter>
    <filter id="bs">
      <feDropShadow dx="1" dy="3" stdDeviation="5" flood-color="#7c3aed" flood-opacity="0.11"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- Dot grid -->
  <rect x="660" y="18" width="210" height="130" fill="url(#dots)" opacity="0.65"/>

  <!-- ── DNA HELIX ── -->
  <!-- back strand -->
  <path d="M 855 10 C 910 55, 955 100, 922 145 C 889 190, 848 210, 878 255 C 908 300, 958 318, 928 363 C 898 408, 858 418, 888 435"
        fill="none" stroke="url(#dna2)" stroke-width="13" stroke-linecap="round" opacity="0.4" filter="url(#ds)"/>
  <!-- front strand -->
  <path d="M 948 10 C 893 55, 848 100, 878 145 C 908 190, 955 210, 922 255 C 889 300, 840 318, 870 363 C 900 408, 948 418, 918 435"
        fill="none" stroke="url(#dna1)" stroke-width="16" stroke-linecap="round" filter="url(#ds)"/>

  <!-- rungs -->
  <line x1="876" y1="44"  x2="930" y2="44"  stroke="url(#dna1)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <line x1="864" y1="76"  x2="942" y2="76"  stroke="url(#dna2)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <line x1="860" y1="108" x2="938" y2="108" stroke="url(#dna1)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <line x1="866" y1="140" x2="932" y2="140" stroke="url(#dna2)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <line x1="878" y1="172" x2="920" y2="172" stroke="url(#dna1)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <line x1="894" y1="204" x2="906" y2="204" stroke="url(#dna2)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <line x1="882" y1="236" x2="918" y2="236" stroke="url(#dna1)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <line x1="866" y1="268" x2="932" y2="268" stroke="url(#dna2)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <line x1="858" y1="300" x2="940" y2="300" stroke="url(#dna1)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <line x1="864" y1="332" x2="934" y2="332" stroke="url(#dna2)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <line x1="876" y1="364" x2="922" y2="364" stroke="url(#dna1)" stroke-width="5" stroke-linecap="round" opacity="0.68"/>

  <!-- ── BUBBLES ── -->
  <!-- top-right: protein network -->
  <circle cx="1072" cy="76" r="60" fill="url(#bub1)" stroke="#c5d8ff" stroke-width="1.5" filter="url(#bs)" opacity="0.93"/>
  <circle cx="1058" cy="68" r="10" fill="none" stroke="#4dabf7" stroke-width="2.5" opacity="0.8"/>
  <circle cx="1076" cy="57" r="7"  fill="none" stroke="#748ffc" stroke-width="2.5" opacity="0.8"/>
  <circle cx="1090" cy="71" r="9"  fill="none" stroke="#4dabf7" stroke-width="2.5" opacity="0.8"/>
  <circle cx="1082" cy="88" r="8"  fill="none" stroke="#9775fa" stroke-width="2.5" opacity="0.8"/>
  <circle cx="1063" cy="85" r="7"  fill="none" stroke="#748ffc" stroke-width="2.5" opacity="0.8"/>
  <line x1="1058" y1="68" x2="1076" y2="57"  stroke="#74c0fc" stroke-width="1.5" opacity="0.6"/>
  <line x1="1076" y1="57" x2="1090" y2="71"  stroke="#74c0fc" stroke-width="1.5" opacity="0.6"/>
  <line x1="1090" y1="71" x2="1082" y2="88"  stroke="#74c0fc" stroke-width="1.5" opacity="0.6"/>
  <line x1="1082" y1="88" x2="1063" y2="85"  stroke="#74c0fc" stroke-width="1.5" opacity="0.6"/>
  <line x1="1063" y1="85" x2="1058" y2="68"  stroke="#74c0fc" stroke-width="1.5" opacity="0.6"/>

  <!-- mid-right: bar chart -->
  <circle cx="1128" cy="218" r="52" fill="url(#bub2)" stroke="#b8f0dc" stroke-width="1.5" filter="url(#bs)" opacity="0.93"/>
  <rect x="1106" y="228" width="10" height="20" rx="2" fill="#38d9a9" opacity="0.85"/>
  <rect x="1120" y="216" width="10" height="32" rx="2" fill="#4dabf7" opacity="0.85"/>
  <rect x="1134" y="222" width="10" height="26" rx="2" fill="#748ffc" opacity="0.85"/>
  <rect x="1148" y="210" width="10" height="38" rx="2" fill="#9775fa" opacity="0.85"/>

  <!-- mid-left: cell -->
  <circle cx="808" cy="228" r="44" fill="url(#bub3)" stroke="#d8c8ff" stroke-width="1.5" filter="url(#bs)" opacity="0.93"/>
  <ellipse cx="808" cy="228" rx="23" ry="23" fill="none" stroke="#9775fa" stroke-width="2.5" opacity="0.7"/>
  <ellipse cx="808" cy="228" rx="10" ry="10" fill="#c5b4fc" opacity="0.5"/>
  <circle  cx="808" cy="228" r="4"  fill="#9775fa" opacity="0.8"/>

  <!-- bottom-right: molecule -->
  <circle cx="1082" cy="340" r="54" fill="url(#bub4)" stroke="#c0d8ff" stroke-width="1.5" filter="url(#bs)" opacity="0.93"/>
  <circle cx="1066" cy="328" r="7" fill="#4dabf7" opacity="0.85"/>
  <circle cx="1092" cy="322" r="7" fill="#38d9a9" opacity="0.85"/>
  <circle cx="1104" cy="348" r="7" fill="#748ffc" opacity="0.85"/>
  <circle cx="1078" cy="356" r="7" fill="#9775fa" opacity="0.85"/>
  <line x1="1066" y1="328" x2="1092" y2="322" stroke="#74c0fc" stroke-width="2.5" opacity="0.7"/>
  <line x1="1092" y1="322" x2="1104" y2="348" stroke="#74c0fc" stroke-width="2.5" opacity="0.7"/>
  <line x1="1104" y1="348" x2="1078" y2="356" stroke="#74c0fc" stroke-width="2.5" opacity="0.7"/>
  <line x1="1078" y1="356" x2="1066" y2="328" stroke="#74c0fc" stroke-width="2.5" opacity="0.7"/>

  <!-- ── LEFT TEXT ── -->
  <!-- BioTender logo -->
  <circle cx="44" cy="40" r="13" fill="none" stroke="url(#bioGrad)" stroke-width="2.5"/>
  <ellipse cx="44" cy="40" rx="13" ry="5.5" fill="none" stroke="url(#agentGrad)" stroke-width="2" transform="rotate(60 44 40)"/>
  <ellipse cx="44" cy="40" rx="13" ry="5.5" fill="none" stroke="url(#bioGrad)" stroke-width="2" transform="rotate(-60 44 40)"/>
  <circle cx="44" cy="40" r="3.5" fill="url(#bioGrad)"/>
  <text x="65" y="46" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1a1a3e">BioTender</text>

  <!-- Title -->
  <text x="50" y="148" font-family="Arial, sans-serif" font-size="70" font-weight="900" fill="#1a1a3e" letter-spacing="-1">Awesome</text>
  <text x="50" y="226" font-family="Arial, sans-serif" font-size="70" font-weight="900" fill="url(#bioGrad)" letter-spacing="-1">Bio</text>
  <text x="50" y="304" font-family="Arial, sans-serif" font-size="70" font-weight="900" fill="url(#agentGrad)" letter-spacing="-1">Agent Skills</text>

  <!-- Underline -->
  <rect x="50" y="316" width="88" height="4" rx="2" fill="url(#ulGrad)"/>

  <!-- Subtitle -->
  <text x="50" y="346" font-family="Arial, sans-serif" font-size="15.5" fill="#555577">A curated collection of bioinformatics and biomedical</text>
  <text x="50" y="365" font-family="Arial, sans-serif" font-size="15.5" fill="#555577">skills for AI agents</text>

  <!-- ── STATS ROW ── -->
  <line x1="50" y1="382" x2="680" y2="382" stroke="#d0d4f0" stroke-width="1" opacity="0.55"/>

  <!-- 1306+ Unique Skills -->
  <polygon points="50,400 68,394 86,400 68,406" fill="none" stroke="url(#iconG)" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="50,407 68,401 86,407 68,413" fill="none" stroke="url(#iconG)" stroke-width="2" stroke-linejoin="round"/>
  <text x="94" y="406" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#1a1a3e">1306+</text>
  <text x="94" y="420" font-family="Arial, sans-serif" font-size="11.5" fill="#7777aa">Unique Skills</text>

  <line x1="200" y1="388" x2="200" y2="424" stroke="#d0d4f0" stroke-width="1.5"/>

  <!-- 15 Categories -->
  <polygon points="216,396 230,390 244,396 230,402" fill="none" stroke="url(#iconG)" stroke-width="2" stroke-linejoin="round"/>
  <line x1="216" y1="396" x2="216" y2="410" stroke="url(#iconG)" stroke-width="2"/>
  <line x1="244" y1="396" x2="244" y2="410" stroke="url(#iconG)" stroke-width="2"/>
  <line x1="230" y1="402" x2="230" y2="416" stroke="url(#iconG)" stroke-width="2"/>
  <polygon points="216,410 230,416 244,410 230,404" fill="none" stroke="url(#iconG)" stroke-width="2" stroke-linejoin="round"/>
  <text x="254" y="406" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#1a1a3e">15</text>
  <text x="254" y="420" font-family="Arial, sans-serif" font-size="11.5" fill="#7777aa">Categories</text>

  <line x1="336" y1="388" x2="336" y2="424" stroke="#d0d4f0" stroke-width="1.5"/>

  <!-- 11 Source Repos -->
  <rect x="352" y="390" width="20" height="26" rx="3" fill="none" stroke="url(#iconG)" stroke-width="2"/>
  <line x1="357" y1="399" x2="367" y2="399" stroke="url(#iconG)" stroke-width="1.8"/>
  <line x1="357" y1="405" x2="367" y2="405" stroke="url(#iconG)" stroke-width="1.8"/>
  <line x1="357" y1="411" x2="364" y2="411" stroke="url(#iconG)" stroke-width="1.8"/>
  <text x="380" y="406" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#1a1a3e">11</text>
  <text x="380" y="420" font-family="Arial, sans-serif" font-size="11.5" fill="#7777aa">Source Repos</text>

  <line x1="462" y1="388" x2="462" y2="424" stroke="#d0d4f0" stroke-width="1.5"/>

  <!-- AI Ready -->
  <path d="M 482 400 L 486 392 L 490 400 L 498 404 L 490 408 L 486 416 L 482 408 L 474 404 Z"
        fill="none" stroke="url(#iconG)" stroke-width="2" stroke-linejoin="round"/>
  <text x="506" y="406" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="url(#bioGrad)">AI Ready</text>
  <text x="506" y="420" font-family="Arial, sans-serif" font-size="11.5" fill="#7777aa">Agent Optimized</text>
</svg>
